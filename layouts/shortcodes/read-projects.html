{{ $role := .Get "role" }}
{{ range (where .Site.RegularPages "Section" "research") }}
    {{ if eq .Params.role $role }}
        <div class="research-card">
            <div class="card-image-wrapper">
                <img src="{{ .RelPermalink }}{{ .Params.image }}" alt="{{ .Title }}">
            </div>
            <div class="card-content">
                <h3>{{ .Title }}</h3>
                <p>{{ .Params.summary }}</p>
                <a href="{{ .RelPermalink }}" class="read-more">Learn More →</a>
            </div>
        </div>
    {{ end }}
{{ end }}
